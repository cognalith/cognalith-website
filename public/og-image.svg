<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent line top -->
  <rect x="100" y="80" width="1000" height="2" fill="url(#accentGrad)" opacity="0.3"/>

  <!-- Logo -->
  <rect x="100" y="150" width="60" height="60" rx="12" fill="url(#logoGrad)"/>
  <text x="130" y="195" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">C</text>
  <text x="180" y="193" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="white">Cognalith</text>

  <!-- Main headline -->
  <text x="100" y="320" font-family="system-ui, sans-serif" font-size="72" font-weight="bold" fill="white">One Founder.</text>
  <text x="100" y="410" font-family="system-ui, sans-serif" font-size="72" font-weight="bold" fill="url(#accentGrad)">Infinite Leverage.</text>

  <!-- Subtext -->
  <text x="100" y="490" font-family="system-ui, sans-serif" font-size="24" fill="#888888">A solo founder running a full software company with 15 AI agents.</text>

  <!-- Stats -->
  <text x="100" y="560" font-family="system-ui, sans-serif" font-size="20" fill="#00d4ff">15 AI Agents</text>
  <text x="280" y="560" font-family="system-ui, sans-serif" font-size="20" fill="#888888">|</text>
  <text x="320" y="560" font-family="system-ui, sans-serif" font-size="20" fill="#a855f7">47 Features</text>
  <text x="480" y="560" font-family="system-ui, sans-serif" font-size="20" fill="#888888">|</text>
  <text x="520" y="560" font-family="system-ui, sans-serif" font-size="20" fill="#22c55e">57% Complete</text>

  <!-- Accent line bottom -->
  <rect x="100" y="590" width="1000" height="2" fill="url(#accentGrad)" opacity="0.3"/>
</svg>
